name: Tests

# Public-repo posture: no pull_request_target, no self-hosted runners, no secrets.
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — bdv (fe-user)
    runs-on: ubuntu-latest
    steps:
      - name: Clone vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          ref: main
          path: app
          submodules: recursive

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: app/plugins/bdv

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Unit tests
        working-directory: app
        run: npx vitest run plugins/bdv/
